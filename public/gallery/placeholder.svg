<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Imagen de galeria pendiente</title>
  <desc id="desc">Marcador visual para fotos de restauracion aun no cargadas.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a1a0e"/>
      <stop offset="55%" stop-color="#6b3520"/>
      <stop offset="100%" stop-color="#3d2010"/>
    </linearGradient>
    <pattern id="grain" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(30)">
      <rect width="12" height="12" fill="transparent"/>
      <rect width="6" height="12" fill="rgba(201,151,58,0.08)"/>
    </pattern>
  </defs>

  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect width="1200" height="900" fill="url(#grain)"/>
  <rect x="60" y="60" width="1080" height="780" fill="none" stroke="rgba(230,192,104,0.35)" stroke-width="2"/>
  <text x="50%" y="46%" text-anchor="middle" font-family="Georgia, serif" font-size="72" fill="#e6c068" letter-spacing="3">NEW LOOK FURNITURE</text>
  <text x="50%" y="54%" text-anchor="middle" font-family="Georgia, serif" font-size="36" fill="#f5efe4">Foto de restauracion pendiente</text>
  <text x="50%" y="61%" text-anchor="middle" font-family="Georgia, serif" font-size="24" fill="#c9973a">Agrega imagenes en /public/gallery/*.jpg</text>
</svg>
